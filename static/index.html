    el.innerHTML = `<div class="analyses-list">${list.map(a=>`
      <div class="an-row" onclick="openAnalysis('${a.id}')">
        <span class="an-type">${esc(a.type)}</span>
        <span class="an-name">${esc(a.name||a.query)}</span>
        <span class="an-date">${(a.created_at||'').slice(0,10)}</span>
        <button class="an-del" onclick="event.stopPropagation();delAnalysis('${a.id}',this)">Delete</button>
      </div>`).join('')}</div>`;
  } catch(e) { const el=document.getElementById('ab'); if(el) el.innerHTML=`<div style="color:var(--red)">${esc(e.message)}</div>`; }
}

async function openAnalysis(id) {
  // ── Fetch + parse ──────────────────────────────────────────────────────────
  let row;
  try {
    const r = await fetch('/api/analyses/' + id);
    if (!r.ok) { toast('Analysis not found'); return; }
    row = await r.json();
  } catch(e) { toast('Network error: ' + e.message); return; }

  // result may be nested under row.result or directly on row
  let result = row.result ?? row;
  if (typeof result === 'string') { try { result = JSON.parse(result); } catch(_) {} }

  // ── Populate state ─────────────────────────────────────────────────────────
  const query    = result.query   || row.query   || '';
  const sections = result.sections || [];
  const answer   = result.answer  || '';

  S.conversation = [];
  if (query) S.conversation.push({ role: 'user', content: query });
  S.conversation.push({
    role:     'assistant',
    content:  answer,
    sections,
    followups:           result.followups  || [],
    citations:           result.citations  || [],
    evidence:            result.evidence   || {},
    query_type:          result.query_type || row.type || 'general',
    _immediateResponse:  result.immediateResponse || '',
  });

  S.allCitations = result.citations || [];

  // ── Navigate — forces full rebuild regardless of current page ─────────────
  navChatFromHistory();
  updateEP(S.allCitations, true);
  scrollThreadToBottom();
}

async function delAnalysis(id, btn) {
  if (!confirm('Delete this analysis?')) return;
  await fetch('/api/analyses/'+id,{method:'DELETE'});
  btn.closest('.an-row').remove();
  toast('Deleted');
  loadRecent();
}

// ── Sidebar recent ──────────────────────────────────────────────────────────
async function loadRecent() {
  try {
    const r = await fetch('/api/analyses?limit=12');
    const data = await r.json();
    const el = document.getElementById('recent-list');
    if (!el) return;
    const list = data.analyses||[];
    if (!list.length) { el.innerHTML='<span style="font-size:11px;color:var(--text3);padding:0 8px">No recent searches</span>'; return; }
    el.innerHTML = list.map(a=>
      `<div class="recent-item" onclick="openAnalysis('${a.id}')"><span class="recent-type">${a.type}</span>${esc((a.name||a.query).slice(0,30))}</div>`
    ).join('');
  } catch(_) {}
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtCitations(text) {
  if (!text) return '';
  return renderMarkdown(text);
}

// ── Table export helpers ─────────────────────────────────────────────────────
let _tableCounter = 0;
function _tableToCSV(tableEl) {
  const rows = [...tableEl.querySelectorAll('tr')];
  return rows.map(r =>
    [...r.querySelectorAll('th,td')].map(c => {
      const v = c.textContent.replace(/"/g, '""');
      return `"${v}"`;
    }).join(',')
  ).join('\n');
}
function exportTableCSV(id) {
  const tbl = document.getElementById(id);
  if (!tbl) return;
  const csv = _tableToCSV(tbl);
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'biosage_table.csv';
  a.click();
}

// ── Markdown renderer (tables + basic formatting + citations) ─────────────────
function renderMarkdown(text) {
  if (!text) return '';

  // Split into blocks on blank lines
  const lines = text.split('\n');
  let html = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Detect markdown table: starts with |
    if (line.trim().startsWith('|')) {
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      html += _renderTable(tableLines);
      continue;
    }

    // Collect paragraph lines
    const para = [];
    while (i < lines.length && lines[i].trim() !== '' && !lines[i].trim().startsWith('|')) {
      para.push(lines[i]);
      i++;
    }
    if (para.length) {
      const joined = para.join('\n').trim();
      if (joined) html += `<p>${_inlineFmt(joined)}</p>`;
    }

    // Skip blank lines
    while (i < lines.length && lines[i].trim() === '') i++;
  }

  return html;
}

function _renderTable(tableLines) {
  if (tableLines.length < 2) return `<p>${esc(tableLines.join(' '))}</p>`;

  const parseRow = line =>
    line.replace(/^\||\|$/g, '').split('|').map(c => c.trim());

  const headers = parseRow(tableLines[0]);
  // second line is separator (---|---), skip it
  const dataRows = tableLines.slice(2).map(parseRow);

  const id = `tbl-${++_tableCounter}`;

  let thead = '<thead><tr>' + headers.map(h => `<th>${_inlineFmt(h)}</th>`).join('') + '</tr></thead>';
  let tbody = '<tbody>' + dataRows.map(row => {
    const cells = headers.map((_, ci) => `<td>${_inlineFmt(row[ci] ?? '')}</td>`).join('');
    return `<tr>${cells}</tr>`;
  }).join('') + '</tbody>';

  return `
<div class="tbl-wrap">
  <div class="tbl-toolbar">
    <span class="tbl-label">${headers.length} columns · ${dataRows.length} rows</span>
    <button class="tbl-export-btn" onclick="exportTableCSV('${id}')">
      ↓ Export CSV / Sheets
    </button>
  </div>
  <div class="tbl-scroll">
    <table id="${id}" class="md-table">${thead}${tbody}</table>
  </div>
</div>`;
}

function _inlineFmt(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\[(\d+)\]/g, '<span class="cite-ref" onclick="scrollCite($1)">$1</span>');
}

function sigBadge(sig) {
  if (!sig) return '<span class="sig sig-U">Unknown</span>';
  const s = sig.toLowerCase();
  if (s.includes('pathogenic')&&s.includes('likely')) return `<span class="sig sig-LP">Likely Pathogenic</span>`;
  if (s.includes('pathogenic')) return `<span class="sig sig-P">Pathogenic</span>`;
  if (s.includes('likely benign')) return `<span class="sig sig-LB">Likely Benign</span>`;
  if (s.includes('benign')) return `<span class="sig sig-B">Benign</span>`;
  if (s.includes('uncertain')||s.includes('vus')) return `<span class="sig sig-VUS">VUS</span>`;
  return `<span class="sig sig-U">${esc(sig)}</span>`;
}

function phaseBadge(phase) {
  const p = Math.min(phase||0,4);
  const labels = {4:'Phase IV',3:'Phase III',2:'Phase II',1:'Phase I',0:'Preclinical'};
  return `<span class="phase phase-${p}">${labels[p]}</span>`;
}

function acmgCls(cls) {
  if (!cls) return '';
  const c = cls.toLowerCase();
  if (c.includes('likely pathogenic')) return 'LP';
  if (c.includes('pathogenic')) return 'P';
  if (c.includes('likely benign')) return 'LB';
  if (c.includes('benign')) return 'B';
  if (c.includes('uncertain')||c.includes('vus')) return 'VUS';
  return '';
}

function acmgCritCls(c) {
  c = c.toLowerCase();
  if (c.startsWith('pvs')) return 'acmg-pvs';
  if (c.startsWith('ps')) return 'acmg-ps';
  if (c.startsWith('pm')) return 'acmg-pm';
  if (c.startsWith('pp')) return 'acmg-pp';
  if (c.startsWith('ba')) return 'acmg-ba';
  if (c.startsWith('bs')) return 'acmg-bs';
  if (c.startsWith('bp')) return 'acmg-bp';
  return '';
}

function vr(key, val) {
  if (!val && val !== 0) return '';
  return `<div class="vcard-row"><span class="key">${esc(key)}</span><span class="val">${esc(String(val))}</span></div>`;
}

function loaderHtml(msg) {
  return `<div class="inline-loader"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>${msg||'Loading...'}</span></div>`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function slugify(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

// ── Progress steps ───────────────────────────────────────────────────────────
function updateProgress(asstIdx, step) {
  const steps = ['retrieving', 'analyzing', 'writing'];
  const stepIdx = steps.indexOf(step);
  steps.forEach((s, i) => {
    const el = document.getElementById(`ps-${asstIdx}-${s}`);
    if (!el) return;
    el.classList.remove('done', 'active');
    if (i < stepIdx) el.classList.add('done');
    else if (i === stepIdx) el.classList.add('active');
  });
}

// ── Mobile sidebar toggle ────────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sov');
  const ham = document.getElementById('ham');
  if (!sb) return;
  const open = sb.classList.toggle('open');
  if (ov) ov.classList.toggle('show', open);
  if (ham) ham.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}

// ── Keyboard shortcut: Cmd/Ctrl+K ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const hs = document.getElementById('hs');
    if (hs) { hs.focus(); hs.select(); return; }
    // Not on home page — go there first
    if (S.page !== 'home') { nav('home'); setTimeout(() => { const h = document.getElementById('hs'); if (h) { h.focus(); } }, 50); }
  }
  if (e.key === 'Escape') {
    const sb = document.getElementById('sidebar');
    if (sb && sb.classList.contains('open')) toggleSidebar();
  }
});

// ── Copy response to clipboard ───────────────────────────────────────────────
function copyMsg(idx) {
  const asst = S.conversation[idx];
  if (!asst) return;
  const text = (asst.sections && asst.sections.length)
    ? asst.sections.map(s => `${s.title}\n${s.content}`).join('\n\n')
    : (asst.content || '');
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-${idx}`);
    if (!btn) return;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2200);
  }).catch(() => toast('Copy failed — check browser permissions'));
}

// ── Retry / regenerate last assistant response ───────────────────────────────
function regenMsg(idx) {
  const userMsg = S.conversation[idx - 1];
  if (!userMsg || userMsg.role !== 'user' || S.loading) return;
  // Remove this assistant turn from conversation + DOM
  S.conversation = S.conversation.slice(0, idx);
  const msgEl = document.getElementById(`msg-${idx}`);
  if (msgEl) msgEl.remove();
  executeQuery(userMsg.content);
}

// ── Init ─────────────────────────────────────────────────────────────────────
nav('home');
loadRecent();
</script>
